<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SAS Audio Prompt Buttons (EN + SV)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
  />
  <style>
    :root { --brand: #0f0066; --ice: #c1e5f5; }
    body { background: #f6f8fb; }
    .card { background:#fff; border-radius:16px; box-shadow:0 10px 25px rgba(15,0,102,.10); }
    .playbtn:focus { outline: 3px solid rgba(193,229,245,.9); outline-offset: 2px; }
    .pill { background: var(--ice); color: var(--brand); }
    .header { background: var(--brand); }
    .btn { background: var(--brand); }
    .btn:hover { filter: brightness(1.05); }
  </style>
</head>
<body class="min-h-screen">
  <header class="header text-white px-5 py-5">
    <div class="max-w-3xl mx-auto">
      <h1 class="text-2xl font-semibold">SAS Swedish Audio Prompts</h1>
      <p class="opacity-90 text-sm">Click any button to play its audio file.</p>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6 space-y-4">
    <!-- Rows -->
    <div id="list" class="space-y-3"></div>

    <!-- Transport + status -->
    <div class="flex items-center gap-3 pt-4">
      <button id="stopAll" class="pill px-4 py-2 rounded font-medium">Stop</button>
      <span id="nowPlaying" class="text-sm text-gray-600">Idle</span>
    </div>
  </main>

  <!-- Single shared audio element -->
  <audio id="player" preload="none"></audio>

  <script>
    // 1) Put your audio file URLs here (MP3, WAV, etc.)
    //    Replace the placeholder URLs with your real SAS Swedish files later.
    const AUDIO_URLS = {
      bookingIssueBerlinStockholm: "./bookingIssueBerlinStockholm.wav",
      soundsGood: "./soundsGood.wav",
      yes: "./yes.wav",
      sure: "./sure.wav",
      readyLetsGo: "./readyLetsGo.wav",
      preferAfternoon: "./preferAfternoon.wav",
      noThatsGood: "./noThatsGood.wav",
      greatThankYou: "./greatThankYou.wav"
    };

    // 2) Content (English + Swedish)
    const ROWS = [
      {
        key: "bookingIssueBerlinStockholm",
        en: "I could not complete my booking on the website, it wouldn't let me select flights. I want to book Berlin to Stockholm, on February 10th, returning February 15th",
        sv: "Jag kunde inte slutföra min bokning på webbplatsen, den lät mig inte välja flyg. Jag vill boka Berlin till Stockholm den tionde februari och resa tillbaka den femtonde februari."
      },
      {
        key: "soundsGood",
        en: "Sounds good.",
        sv: "Låter bra."
      },
      {
        key: "yes",
        en: "Yes",
        sv: "Ja."
      },
      {
        key: "sure",
        en: "Sure",
        sv: "Visst."
      },
      {
        key: "readyLetsGo",
        en: "I am ready let's go",
        sv: "Jag är redo, kör vi."
      },
      {
        key: "preferAfternoon",
        en: "I prefere afternoon",
        sv: "Jag föredrar eftermiddagen."
      },
      {
        key: "noThatsGood",
        en: "No, I think that is good for now",
        sv: "Nej, jag tror att det räcker för tillfället."
      },
      {
        key: "greatThankYou",
        en: "Great! Thank you, have a great day!",
        sv: "Toppen. Tack så mycket, ha en fortsatt trevlig dag."
      }
    ];

    // Build UI
    const list = document.getElementById("list");
    ROWS.forEach(({ key, en, sv }) => {
      const row = document.createElement("div");
      row.className = "card p-4 flex items-start justify-between gap-4";

      const left = document.createElement("div");
      left.className = "flex-1";

      const btn = document.createElement("button");
      btn.className = "playbtn btn w-full sm:w-auto px-4 py-3 rounded font-semibold text-white transition";
      btn.textContent = en;
      btn.setAttribute("data-key", key);
      btn.setAttribute("aria-label", `Play: ${en}`);

      const right = document.createElement("div");
      right.className = "text-sm text-gray-700 mt-3 sm:mt-0 sm:ml-4 sm:self-center sm:text-right max-w-md";
      right.textContent = sv;

      left.appendChild(btn);
      row.appendChild(left);
      row.appendChild(right);
      list.appendChild(row);
    });

    // Audio wiring
    const player = document.getElementById("player");
    const nowPlaying = document.getElementById("nowPlaying");
    const stopAll = document.getElementById("stopAll");

    function setStatus(text) {
      nowPlaying.textContent = text || "Idle";
    }

    list.addEventListener("click", (e) => {
      const btn = e.target.closest("button.playbtn");
      if (!btn) return;

      const key = btn.getAttribute("data-key");
      const url = AUDIO_URLS[key];

      if (!url) {
        alert("No audio URL configured for this item. Please update AUDIO_URLS.");
        return;
      }

      player.pause();
      player.src = url;
      player.currentTime = 0;

      player.play()
        .then(() => setStatus(`Playing: ${btn.textContent}`))
        .catch(err => {
          console.error(err);
          setStatus("Error playing audio");
          alert("Could not play the audio. Check the file URL and CORS settings.");
        });
    });

    stopAll.addEventListener("click", () => {
      player.pause();
      player.currentTime = 0;
      setStatus("Idle");
    });

    player.addEventListener("ended", () => setStatus("Idle"));
  </script>
</body>
</html>
