<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Audio Prompt Buttons (EN + CY)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
  />
  <style>
    :root { --brand: #2470B8; }
    body { background: #f6f8fb; }
    .card { background:#fff; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,.10); }
    .playbtn:focus { outline: 3px solid rgba(36,112,184,.5); outline-offset: 2px; }
    .pill { background:#eef4fb; color:#0f2f4c; }
  </style>
</head>
<body class="min-h-screen">
  <header class="bg-blue-700 text-white px-5 py-5">
    <h1 class="text-2xl font-semibold">Welsh Audio Prompts</h1>
    <p class="opacity-90 text-sm">Click any button to play its audio file.</p>
  </header>

  <main class="max-w-3xl mx-auto px-4 py-6 space-y-4">
    <!-- Rows -->
    <div id="list" class="space-y-3"></div>

    <!-- Transport + status -->
    <div class="flex items-center gap-3 pt-4">
      <button id="stopAll" class="pill px-4 py-2 rounded font-medium">Stop</button>
      <span id="nowPlaying" class="text-sm text-gray-600">Idle</span>
    </div>
  </main>

  <!-- Single shared audio element -->
  <audio id="player" preload="none"></audio>

  <script>
    // 1) Put your audio file URLs here (MP3, WAV, etc.)
    //    Replace the example.com links with your real URLs.
    const AUDIO_URLS = {
      helloNewClaim: "https://emeaazurestorageaccount.blob.core.windows.net/uk-gtm/Welsh Audio/Start Claim (Welsh Statements).mp3",
      claimUniversalCredit: "https://emeaazurestorageaccount.blob.core.windows.net/uk-gtm/Welsh Audio/Universal Credit (Welsh Statements).mp3",
      myNameDaniel: "https://emeaazurestorageaccount.blob.core.windows.net/uk-gtm/Welsh Audio/First Name (Welsh Statements).mp3",
      itsWoodward: "https://emeaazurestorageaccount.blob.core.windows.net/uk-gtm/Welsh Audio/Last Name (Welsh Statements).mp3",
      dateDob: "https://emeaazurestorageaccount.blob.core.windows.net/uk-gtm/Welsh Audio/Date of Birth (Welsh Statements).mp3",
      jtCode: "https://emeaazurestorageaccount.blob.core.windows.net/uk-gtm/Welsh Audio/National Insurance (Welsh Statements).mp3"
    };

    // 2) Content (English + Welsh)
    const ROWS = [
      {
        key: "helloNewClaim",
        en: "Hello, I want to start a new claim",
        cy: "Helo, hoffwn ddechrau hawliad newydd."
      },
      {
        key: "claimUniversalCredit",
        en: "I want to claim for Universal Credit",
        cy: "Hoffwn hawlio Credyd Cynhwysol."
      },
      {
        key: "myNameDaniel",
        en: "My name is Daniel",
        cy: "Fy enw i yw Daniel."
      },
      {
        key: "itsWoodward",
        en: "It's Woodward",
        cy: "Mae’n Woodward."
      },
      {
        key: "dateDob",
        en: "It's the third of June nineteen eighty nine",
        cy: "Y trydydd o Fehefin, mil naw cant wyth deg naw."
      },
      {
        key: "jtCode",
        en: "its J T eight one one five seven zero C",
        cy: "Mae’n J T wyth un un pump saith sero C."
      }
    ];

    // Build UI
    const list = document.getElementById("list");
    ROWS.forEach(({ key, en, cy }) => {
      const row = document.createElement("div");
      row.className = "card p-4 flex items-start justify-between";

      const left = document.createElement("div");
      left.className = "flex-1 pr-3";
      const btn = document.createElement("button");
      btn.className = "playbtn w-full sm:w-auto px-4 py-3 rounded font-semibold bg-blue-600 text-white hover:bg-blue-700 transition";
      btn.textContent = en;
      btn.setAttribute("data-key", key);
      btn.setAttribute("aria-label", `Play: ${en}`);

      const right = document.createElement("div");
      right.className = "text-sm text-gray-700 mt-3 sm:mt-0 sm:ml-4 sm:self-center";
      right.textContent = cy;

      left.appendChild(btn);
      row.appendChild(left);
      row.appendChild(right);
      list.appendChild(row);
    });

    // Audio wiring
    const player = document.getElementById("player");
    const nowPlaying = document.getElementById("nowPlaying");
    const stopAll = document.getElementById("stopAll");

    function setStatus(text) {
      nowPlaying.textContent = text || "Idle";
    }

    list.addEventListener("click", (e) => {
      const btn = e.target.closest("button.playbtn");
      if (!btn) return;
      const key = btn.getAttribute("data-key");
      const url = AUDIO_URLS[key];

      if (!url) {
        alert("No audio URL configured for this item. Please update AUDIO_URLS.");
        return;
      }

      // Load and play
      player.pause();
      player.src = url;
      player.currentTime = 0;
      player.play()
        .then(() => setStatus(`Playing: ${btn.textContent}`))
        .catch(err => {
          console.error(err);
          setStatus("Error playing audio");
          alert("Could not play the audio. Check the file URL and CORS settings.");
        });
    });

    stopAll.addEventListener("click", () => {
      player.pause();
      player.currentTime = 0;
      setStatus("Idle");
    });

    player.addEventListener("ended", () => setStatus("Idle"));
  </script>
</body>
</html>
